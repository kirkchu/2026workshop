<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2026時間設計半日工作坊</title>
    <meta
      name="description"
      content="2026時間設計半日工作坊活動資訊與線上報名表單"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="title-row" aria-labelledby="event-title">
        <h1 id="event-title">2026時間設計半日工作坊</h1>
      </section>

      <section class="image-row" aria-label="活動圖片">
        <img src="cover.jpg" alt="2026時間設計半日工作坊活動圖片" />
      </section>

      <section class="details-row" aria-label="活動內容與報名表單">
        <article class="schedule-block" aria-labelledby="schedule-title">
          <h2 id="schedule-title">活動內容</h2>
          <ol class="timeline">
            <li>
              <time datetime="08:00">8:00</time>
              <span>報到</span>
            </li>
            <li>
              <time datetime="09:00">9:00</time>
              <span>場次一</span>
            </li>
            <li>
              <time datetime="10:00">10:00</time>
              <span>break time</span>
            </li>
            <li>
              <time datetime="10:30">10:30</time>
              <span>場次二</span>
            </li>
            <li>
              <time datetime="11:30">11:30</time>
              <span>Q&amp;A</span>
            </li>
            <li>
              <time datetime="12:00">12:00</time>
              <span>活動結束</span>
            </li>
          </ol>
        </article>

        <section class="form-block" aria-labelledby="form-title">
          <h2 id="form-title">報名表單</h2>
          <form id="registration-form">
            <div class="field">
              <label for="name">姓名</label>
              <input id="name" name="name" autocomplete="name" required />
            </div>
            <div class="field">
              <label for="email">email</label>
              <input
                id="email"
                name="email"
                type="email"
                autocomplete="email"
                required
              />
            </div>
            <div class="field">
              <label for="phone">電話</label>
              <input
                id="phone"
                name="phone"
                type="tel"
                inputmode="tel"
                autocomplete="tel"
                required
              />
            </div>
            <div class="field">
              <label for="organization">單位</label>
              <input id="organization" name="organization" autocomplete="organization" />
            </div>
            <div class="field">
              <label for="jobTitle">職稱</label>
              <input id="jobTitle" name="jobTitle" autocomplete="organization-title" />
            </div>
            <button type="submit">送出報名</button>
            <p id="form-status" class="form-status" role="status" aria-live="polite"></p>
          </form>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
